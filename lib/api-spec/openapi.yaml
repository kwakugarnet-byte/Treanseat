openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Bike Management System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: bikes
    description: Bike management
  - name: sales
    description: Sales recording
  - name: maintenance
    description: Maintenance expenses
  - name: maintenance-types
    description: Predefined maintenance type labels
  - name: users
    description: User management
  - name: snooker
    description: Snooker board management
  - name: snooker-maintenance
    description: Snooker equipment maintenance
  - name: snooker-workers
    description: Snooker worker and salary management
  - name: dashboard
    description: Dashboard summaries
  - name: riders
    description: Rider management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with PIN
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "401":
          description: Invalid PIN
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (admin only)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a user (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update a user (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete a user (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /bikes:
    get:
      operationId: listBikes
      tags: [bikes]
      summary: List all bikes
      responses:
        "200":
          description: List of bikes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bike"
    post:
      operationId: createBike
      tags: [bikes]
      summary: Create a bike (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BikeInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bike"

  /bikes/{id}:
    get:
      operationId: getBike
      tags: [bikes]
      summary: Get a bike
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bike
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bike"
    patch:
      operationId: updateBike
      tags: [bikes]
      summary: Update a bike (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BikeUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bike"
    delete:
      operationId: deleteBike
      tags: [bikes]
      summary: Delete a bike (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /sales:
    get:
      operationId: listSales
      tags: [sales]
      summary: List sales records
      parameters:
        - name: bikeId
          in: query
          required: false
          schema:
            type: integer
        - name: weekStart
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of sales
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Sale"
    post:
      operationId: createSale
      tags: [sales]
      summary: Record a sale
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaleInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sale"

  /sales/{id}:
    patch:
      operationId: updateSale
      tags: [sales]
      summary: Update a sale record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaleUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sale"
    delete:
      operationId: deleteSale
      tags: [sales]
      summary: Delete a sale record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /maintenance:
    get:
      operationId: listMaintenance
      tags: [maintenance]
      summary: List maintenance records
      parameters:
        - name: bikeId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of maintenance records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MaintenanceRecord"
    post:
      operationId: createMaintenance
      tags: [maintenance]
      summary: Log a maintenance expense
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MaintenanceInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaintenanceRecord"

  /maintenance-types:
    get:
      operationId: listMaintenanceTypes
      tags: [maintenance-types]
      summary: List all predefined maintenance types
      responses:
        "200":
          description: List of types
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MaintenanceType"
    post:
      operationId: createMaintenanceType
      tags: [maintenance-types]
      summary: Create a new maintenance type
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MaintenanceTypeInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaintenanceType"

  /maintenance-types/{id}:
    patch:
      operationId: updateMaintenanceType
      tags: [maintenance-types]
      summary: Update a maintenance type
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MaintenanceTypeUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaintenanceType"
    delete:
      operationId: deleteMaintenanceType
      tags: [maintenance-types]
      summary: Delete a maintenance type
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /maintenance/{id}:
    patch:
      operationId: updateMaintenance
      tags: [maintenance]
      summary: Update a maintenance record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MaintenanceUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaintenanceRecord"
    delete:
      operationId: deleteMaintenance
      tags: [maintenance]
      summary: Delete a maintenance record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary (fleet overview)
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/profit:
    get:
      operationId: getProfitSummary
      tags: [dashboard]
      summary: Get profit summary (admin only)
      parameters:
        - name: weeks
          in: query
          required: false
          schema:
            type: integer
        - name: startDate
          in: query
          required: false
          schema:
            type: string
        - name: endDate
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Profit breakdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfitSummary"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dashboard/combined:
    get:
      operationId: getCombinedProfit
      tags: [dashboard]
      summary: Combined bike + snooker revenue vs manager salary
      parameters:
        - name: month
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Combined profit summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CombinedProfit"

  /snooker/boards:
    get:
      operationId: listSnookerBoards
      tags: [snooker]
      summary: List all snooker boards
      responses:
        "200":
          description: List of boards
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SnookerBoard"
    post:
      operationId: createSnookerBoard
      tags: [snooker]
      summary: Create a snooker board (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SnookerBoardInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SnookerBoard"

  /snooker/sessions:
    get:
      operationId: listSnookerSessions
      tags: [snooker]
      summary: List snooker sessions
      parameters:
        - name: boardId
          in: query
          required: false
          schema:
            type: integer
        - name: date
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SnookerSession"
    post:
      operationId: createSnookerSession
      tags: [snooker]
      summary: Record a snooker session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SnookerSessionInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SnookerSession"

  /snooker/sessions/{id}:
    patch:
      operationId: updateSnookerSession
      tags: [snooker]
      summary: Update a snooker session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SnookerSessionUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SnookerSession"
    delete:
      operationId: deleteSnookerSession
      tags: [snooker]
      summary: Delete a snooker session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /snooker/maintenance:
    get:
      operationId: listSnookerMaintenance
      tags: [snooker-maintenance]
      summary: List snooker maintenance records
      responses:
        "200":
          description: List
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SnookerMaintenanceRecord"
    post:
      operationId: createSnookerMaintenance
      tags: [snooker-maintenance]
      summary: Log a snooker maintenance expense
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SnookerMaintenanceInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SnookerMaintenanceRecord"

  /snooker/maintenance/{id}:
    patch:
      operationId: updateSnookerMaintenance
      tags: [snooker-maintenance]
      summary: Update a snooker maintenance record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SnookerMaintenanceInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SnookerMaintenanceRecord"
    delete:
      operationId: deleteSnookerMaintenance
      tags: [snooker-maintenance]
      summary: Delete a snooker maintenance record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /snooker/workers:
    get:
      operationId: listSnookerWorkers
      tags: [snooker-workers]
      summary: List snooker workers
      responses:
        "200":
          description: List
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SnookerWorker"
    post:
      operationId: createSnookerWorker
      tags: [snooker-workers]
      summary: Create a snooker worker (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SnookerWorkerInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SnookerWorker"

  /snooker/workers/{id}:
    patch:
      operationId: updateSnookerWorker
      tags: [snooker-workers]
      summary: Update a snooker worker (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SnookerWorkerInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SnookerWorker"
    delete:
      operationId: deleteSnookerWorker
      tags: [snooker-workers]
      summary: Delete a snooker worker (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /snooker/salary:
    get:
      operationId: getSnookerSalary
      tags: [snooker-workers]
      summary: Get monthly salary summary with loss deductions
      parameters:
        - name: workerId
          in: query
          required: true
          schema:
            type: integer
        - name: month
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Salary summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SnookerSalarySummary"

  /snooker/summary:
    get:
      operationId: getSnookerSummary
      tags: [snooker]
      summary: Get snooker summary (admin only)
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SnookerSummary"

  /dashboard/bike-performance:
    get:
      operationId: getBikePerformance
      tags: [dashboard]
      summary: Get per-bike sales performance
      responses:
        "200":
          description: Bike performance
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BikePerformance"

  /riders:
    get:
      operationId: listRiders
      tags: [riders]
      summary: List all riders
      responses:
        "200":
          description: List of riders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Rider"
    post:
      operationId: createRider
      tags: [riders]
      summary: Register a new rider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RiderInput"
      responses:
        "201":
          description: Created rider
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rider"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /riders/{id}:
    get:
      operationId: getRider
      tags: [riders]
      summary: Get a rider by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Rider
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rider"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateRider
      tags: [riders]
      summary: Update a rider
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RiderUpdate"
      responses:
        "200":
          description: Updated rider
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rider"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteRider
      tags: [riders]
      summary: Delete a rider
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

components:
  schemas:
    Rider:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        age:
          type: integer
        phone:
          type: string
        emergencyContactName:
          type: string
        emergencyContactPhone:
          type: string
        emergencyContactAge:
          type: integer
        bikeId:
          type: integer
        bikeName:
          type: string
        createdAt:
          type: string
      required: [id, name, age, phone, emergencyContactName, emergencyContactPhone, emergencyContactAge, bikeId, bikeName, createdAt]

    RiderInput:
      type: object
      properties:
        name:
          type: string
        age:
          type: integer
        phone:
          type: string
        emergencyContactName:
          type: string
        emergencyContactPhone:
          type: string
        emergencyContactAge:
          type: integer
        bikeId:
          type: integer
      required: [name, age, phone, emergencyContactName, emergencyContactPhone, emergencyContactAge, bikeId]

    RiderUpdate:
      type: object
      properties:
        name:
          type: string
        age:
          type: integer
        phone:
          type: string
        emergencyContactName:
          type: string
        emergencyContactPhone:
          type: string
        emergencyContactAge:
          type: integer
        bikeId:
          type: integer

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required: [success]

    LoginInput:
      type: object
      properties:
        pin:
          type: string
      required: [pin]

    AuthResult:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
      required: [user, token]

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        role:
          type: string
          enum: [admin, manager]
        monthlySalary:
          type: number
        createdAt:
          type: string
      required: [id, name, role, monthlySalary, createdAt]

    UserInput:
      type: object
      properties:
        name:
          type: string
        pin:
          type: string
        role:
          type: string
          enum: [admin, manager]
      required: [name, pin, role]

    UserUpdate:
      type: object
      properties:
        name:
          type: string
